services:
  postgres:
    image: postgres:16
    container_name: cabinet_paramedical_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: cabinet_paramedical
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d cabinet_paramedical"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
